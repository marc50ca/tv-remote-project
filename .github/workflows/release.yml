name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
      - uses: hacs/action@main
        with:
          category: integration

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Stamp version into manifest.json
        run: |
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" \
            custom_components/tv_remote/manifest.json

      - name: Build HACS-compatible release zip
        # HACS expects the zip to contain custom_components/tv_remote/ at root
        run: |
          zip -r tv_remote.zip custom_components/tv_remote/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TV Remote v${{ env.VERSION }}"
          files: tv_remote.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
